version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hackitall-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hackitall
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hackitall_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hackitall -d hackitall_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
